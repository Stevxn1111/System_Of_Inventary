<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../archivos_CSS/styleFormulario.css">
    <title>Formulario de Inscripcion </title>

    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class=" formularioInscripcion">
    <form id="formulario">
        <h2> Registrar Cliente</h2>
        <h3> Ingresa sus Datos</h3>

        <div class="campos">
            <i class='bx bx-user'></i>
            <input type="text" name="nombre" placeholder="Nombres" required>

        </div>

        <div class="campos">
            <i class='bx  bx-receipt'  ></i>
            <input type="text" name="apellido" placeholder="Apellidos" required>

        </div>
        <div class="campos">
            <i class='bx  bx-envelope-open'  ></i>
            <input type="email" name="email" placeholder="Correo electronico" required>

        </div>
        <div class="campos">
            <i class='bx bx-phone'></i>
            <input type="text" name="telefono" placeholder="Telefono" required>


        </div>
        <div class="campos">
            <i class='bx  bx-user'  ></i>
            <input type="usuario" name="usuario" placeholder="Usuario" required>


        </div>
        <div class="campos">
            <i class='bx bx-lock'></i>
            <input type="password" name="pasword" placeholder="Contraseña" required>

        </div>


            <button class= "botones" id = "btn_registrar" type="submit">Registrarse</button>
            
            <button class= "botones" id = "btn_limpiar"  type="reset">Limpiar</button>

            <button class= "botones" id = "btn_volver"  type="button" onclick="window.location.href='../index.html'">Volver</button>


    </form>




</div>

</body>
</html>
